<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card details — Mobilix IdeasCaards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/overrides.css" />
</head>
<body class="has-bottom-nav">
  <div data-component="sidebar" data-active="home"></div>

  <div class="with-sidebar min-h-screen">
    <header class="sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-slate-100">
      <div class="px-4 lg:px-8 h-16 flex items-center gap-3">
        <a href="javascript:history.back()" class="-ml-1 p-2 rounded-md hover:bg-slate-100" aria-label="Back">
          <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
        </a>
        <h1 class="text-lg lg:text-xl font-semibold text-slate-900">Plan Based &gt; Retirement</h1>
      </div>
    </header>

    <main class="px-4 lg:px-8 py-6">
      <div data-lang-group class="flex gap-2 overflow-x-auto pb-2 mb-6 scroll-row lang-row">
        <button data-lang="en" class="px-4 py-1.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700 is-active">English</button>
        <button data-lang="hi" class="px-4 py-1.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700">Hindi</button>
        <button data-lang="ml" class="px-4 py-1.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700">Malayalam</button>
        <button data-lang="ta" class="px-4 py-1.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700">Tamil</button>
        <button data-lang="gu" class="px-4 py-1.5 rounded-full border border-slate-300 text-sm font-medium text-slate-700">Gujarati</button>
      </div>

      <div class="rounded-3xl overflow-hidden bg-white shadow-soft border border-slate-100 mb-6">
        <div class="aspect-[3/4] bg-gradient-to-br from-amber-50 to-amber-100 relative">
          <div class="absolute top-6 left-6 right-6">
            <p class="text-slate-700 text-sm">Life Insurance</p>
            <p class="text-slate-900 font-bold text-2xl mt-1 leading-tight">Take the responsibility + protect your family</p>
            <p class="text-amber-700 font-bold text-lg mt-3">Save ₹87/day, get</p>
            <p class="text-amber-600 font-bold text-3xl">RS. 44,19,000</p>
            <p class="text-slate-700 font-semibold mt-1">at maturity</p>
          </div>
          <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?w=800" class="absolute bottom-0 left-0 right-0 h-1/2 w-full object-cover" onerror="this.style.display='none'" />
        </div>
      </div>

      <button class="w-full bg-brand-gradient-r text-white text-base font-semibold rounded-xl py-3 shadow-soft" data-open-modal="personaliseCard">Personalise This Card</button>
    </main>

    <div data-component="footer"></div>
  </div>

  <div data-component="bottom-nav" data-active="home"></div>
  <div data-component="modal-personalise" data-id="personaliseCard" data-kind="card"></div>

  <script src="../assets/js/partials.js"></script>
  <script src="../assets/js/ui.js"></script>
</body>
</html>
