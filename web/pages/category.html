<!DOCTYPE html>

  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/overrides.css" />

<body class="has-bottom-nav">
  <div data-component="sidebar" data-active="home"></div>

          <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
        </a>
        <h1 id="categoryTitle" class="text-lg lg:text-xl font-semibold text-slate-900">Plan Based</h1>
      </div>
    </header>

    <main class="px-4 lg:px-8 py-6">
      <div id="categoryGrid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </main>

    <div data-component="footer"></div>
  </div>

  <div data-component="bottom-nav" data-active="home"></div>

          ['Money Back', 'https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=600'],

        ],
      },
    };

    const params = new URLSearchParams(window.location.search);
    const cat = params.get('cat') || 'plan-based';
    const data = CATEGORIES[cat] || CATEGORIES['plan-based'];
    document.getElementById('categoryTitle').textContent = data.title;
    document.title = `${data.title} — Mobilix IdeasCaards`;
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = data.items.map(([title, image]) => `
      <div data-component="category-tile" data-title="${title}" data-image="${image}" data-href="subcategory.html?cat=${cat}&sub=${encodeURIComponent(title)}"></div>
    `).join('');
  </script>
  <script src="../assets/js/partials.js"></script>
  <script src="../assets/js/ui.js"></script>
</body>
</html>
