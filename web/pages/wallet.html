<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet — Mobilix IdeasCaards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/overrides.css" />
</head>
<body class="has-bottom-nav">
  <div data-component="sidebar" data-active="profile"></div>
  <div class="with-sidebar min-h-screen">
    <header class="border-b border-slate-100 bg-white">
      <div class="px-4 lg:px-8 h-16 flex items-center gap-3">
        <a href="profile.html" class="-ml-1 p-2 rounded-md hover:bg-slate-100" aria-label="Back">
          <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
        </a>
        <h1 class="text-lg lg:text-xl font-semibold text-slate-900">Wallet</h1>
      </div>
    </header>

    <main class="px-4 lg:px-8 py-6 max-w-3xl">
      <!-- Hero illustration band -->
      <div class="rounded-2xl overflow-hidden relative" style="background: linear-gradient(180deg, #dbeafe 0%, #bae6fd 100%);">
        <div class="px-4 py-10 text-center">
          <div class="text-7xl select-none mb-2">💼</div>
          <p class="text-sm text-slate-600">Earn points by referring friends and redeem them inside the app.</p>
        </div>
        <div class="grid grid-cols-2 gap-3 px-4 pb-4 -mt-4 relative">
          <div class="rounded-xl bg-white shadow-soft px-4 py-3 text-center">
            <p class="text-sm font-medium text-slate-600">Total Points Earned</p>
            <p class="text-2xl font-extrabold text-slate-900 mt-1">0 pts</p>
          </div>
          <div class="rounded-xl bg-white shadow-soft px-4 py-3 text-center">
            <p class="text-sm font-medium text-slate-600">Balance Wallet Points</p>
            <p class="text-2xl font-extrabold text-slate-900 mt-1">0 pts</p>
          </div>
        </div>
      </div>

      <!-- Tab switcher -->
      <div data-tabs="wallet" class="segmented inline-flex bg-slate-100 rounded-full p-1 w-full max-w-sm mt-6">
        <button class="flex-1 py-2 px-4 rounded-full text-sm font-semibold text-slate-600 is-active" data-tab="referral">Referral History</button>
        <button class="flex-1 py-2 px-4 rounded-full text-sm font-semibold text-slate-600" data-tab="redeem">Redeem History</button>
      </div>

      <section data-tab-panel="referral" data-tab-group="wallet" class="mt-8 text-center">
        <p class="text-2xl text-slate-400 font-semibold">No Records Found.</p>
      </section>
      <section data-tab-panel="redeem" data-tab-group="wallet" class="hidden mt-8 text-center">
        <p class="text-2xl text-slate-400 font-semibold">No Records Found.</p>
      </section>
    </main>

    <div data-component="footer"></div>
  </div>
  <div data-component="bottom-nav" data-active="profile"></div>
  <script src="../assets/js/partials.js"></script>
  <script src="../assets/js/ui.js"></script>
</body>
</html>
