<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Mobilix IdeasCaards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/overrides.css" />
</head>
<body>
  <div class="min-h-screen flex flex-col lg:flex-row">
    <section class="bg-brand-gradient text-white px-6 py-10 lg:px-16 lg:py-16 lg:w-1/2 flex flex-col items-center justify-center text-center relative overflow-hidden">
      <div class="absolute inset-0 opacity-20" style="background-image: linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px); background-size: 64px 64px;"></div>
      <div class="relative max-w-md">
        <img src="../assets/img/logo.png" alt="Mobilix IdeasCaards" class="h-28 lg:h-40 mx-auto" />
        <h2 class="text-3xl lg:text-5xl font-bold leading-tight mt-12">Forgot Password?</h2>
        <p class="mt-3 text-white/85 text-base lg:text-lg">We'll send a reset link to your registered email.</p>
      </div>
    </section>
    <section class="bg-white flex-1 px-6 py-8 lg:px-16 lg:py-16 lg:w-1/2 flex items-center">
      <form class="w-full max-w-md mx-auto space-y-5" onsubmit="event.preventDefault(); alert('Reset link sent (mockup)'); window.location.href='login.html';">
        <label class="block">
          <span class="text-sm font-medium text-slate-500">Registered email</span>
          <input type="email" required class="mt-1 w-full rounded-xl border border-slate-200 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue/30" placeholder="you@example.com" />
        </label>
        <button type="submit" class="w-full bg-brand-gradient-r text-white text-base font-semibold rounded-xl py-3 shadow-soft">Send reset link</button>
        <p class="text-center text-sm text-slate-500">
          Remembered it? <a href="login.html" class="font-bold text-brand-blue hover:underline">Back to login</a>
        </p>
      </form>
    </section>
  </div>
  <script src="../assets/js/partials.js"></script>
  <script src="../assets/js/ui.js"></script>
</body>
</html>
