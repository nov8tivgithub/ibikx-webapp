<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Mobilix IdeasCaards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/overrides.css" />
</head>
<body>
  <div class="min-h-screen flex flex-col lg:flex-row">
    <section class="bg-brand-gradient text-white px-6 py-10 lg:px-16 lg:py-16 lg:w-1/2 flex flex-col items-center justify-center text-center relative overflow-hidden">
      <div class="absolute inset-0 opacity-20" style="background-image: linear-gradient(rgba(255,255,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.15) 1px, transparent 1px); background-size: 64px 64px;"></div>
      <div class="relative max-w-md">
        <img src="../assets/img/logo.png" alt="Mobilix IdeasCaards" class="h-28 lg:h-40 mx-auto" />
        <h2 class="text-3xl lg:text-5xl font-bold leading-tight mt-12">Log In To Your Account</h2>
        <p class="mt-3 text-white/85 text-base lg:text-lg">Enter your email and password to login.</p>
        <p class="hidden lg:block text-sm text-white/70 mt-12">Build your brand through daily customer interaction with insurance-themed cards and videos.</p>
      </div>
    </section>
    <section class="bg-white flex-1 px-6 py-8 lg:px-16 lg:py-16 lg:w-1/2 flex items-center">
      <form class="w-full max-w-md mx-auto space-y-5" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <label class="block">
          <span class="text-sm font-medium text-slate-500">Email</span>
          <input type="email" required class="mt-1 w-full rounded-xl border border-slate-200 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue/30" placeholder="Email" />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-500">Password</span>
          <div class="relative mt-1">
            <input type="password" required class="w-full rounded-xl border border-slate-200 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue/30 pr-11" placeholder="Password" />
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" data-password-toggle aria-label="Show password">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M1.5 12s4-8 10.5-8 10.5 8 10.5 8-4 8-10.5 8S1.5 12 1.5 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </label>
        <div class="text-right">
          <a href="forgot-password.html" class="text-sm font-semibold text-brand-blue hover:underline">Forgot Password?</a>
        </div>
        <button type="submit" class="w-full bg-brand-gradient-r text-white text-base font-semibold rounded-xl py-3 shadow-soft hover:opacity-95 transition">Sign In</button>
        <p class="text-center text-sm text-slate-500">
          New to Ideascaards? <a href="signup.html" class="font-bold text-brand-blue hover:underline">Join now</a>
        </p>
      </form>
    </section>
  </div>
  <script src="../assets/js/partials.js"></script>
  <script src="../assets/js/ui.js"></script>
</body>
</html>
