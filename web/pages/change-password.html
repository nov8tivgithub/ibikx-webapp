<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password — Mobilix IdeasCaards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/overrides.css" />
</head>
<body class="has-bottom-nav">
  <div data-component="sidebar" data-active="profile"></div>
  <div class="with-sidebar min-h-screen">
    <header class="border-b border-slate-100 bg-white">
      <div class="px-4 lg:px-8 h-16 flex items-center gap-3">
        <a href="account.html" class="-ml-1 p-2 rounded-md hover:bg-slate-100" aria-label="Back">
          <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
        </a>
        <h1 class="text-lg lg:text-xl font-semibold text-slate-900">Change Password</h1>
      </div>
    </header>
    <main class="px-4 lg:px-8 py-6 max-w-md">
      <form class="space-y-5" onsubmit="event.preventDefault(); alert('Password updated (mockup)'); window.location.href='account.html';">
        <label class="block">
          <span class="text-sm font-medium text-slate-500">Current password</span>
          <input type="password" required class="mt-1 w-full rounded-xl border border-slate-200 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue/30" />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-500">New password</span>
          <input type="password" required class="mt-1 w-full rounded-xl border border-slate-200 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue/30" />
        </label>
        <label class="block">
          <span class="text-sm font-medium text-slate-500">Confirm new password</span>
          <input type="password" required class="mt-1 w-full rounded-xl border border-slate-200 px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-blue/30" />
        </label>
        <button type="submit" class="w-full bg-brand-gradient-r text-white text-base font-semibold rounded-xl py-3 shadow-soft">Update password</button>
      </form>
    </main>
    <div data-component="footer"></div>
  </div>
  <div data-component="bottom-nav" data-active="profile"></div>
  <script src="../assets/js/partials.js"></script>
  <script src="../assets/js/ui.js"></script>
</body>
</html>
