<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Subscription Plans — Mobilix IdeasCaards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="../assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/overrides.css" />
</head>
<body class="has-bottom-nav">
  <div data-component="sidebar" data-active="profile"></div>

  <div class="with-sidebar min-h-screen">
    <header class="sticky top-0 z-20 bg-white/95 backdrop-blur border-b border-slate-100">
      <div class="px-4 lg:px-8 h-16 flex items-center gap-3">
        <a href="profile.html" class="-ml-1 p-2 rounded-md hover:bg-slate-100" aria-label="Back">
          <svg class="w-6 h-6 text-slate-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/></svg>
        </a>
        <h1 class="text-lg lg:text-xl font-semibold text-slate-900">Video Subscription Plans</h1>
      </div>
    </header>

    <main class="px-4 lg:px-8 py-6">
      <div class="grid grid-cols-3 gap-3 mb-6">
        <div data-component="stat-card" data-value="37" data-label="Total Credits Purchased"></div>
        <div data-component="stat-card" data-value="27" data-label="Credits Used"></div>
        <div data-component="stat-card" data-value="10" data-label="Remaining Credits"></div>
      </div>

      <p class="text-sm text-slate-500 mb-4">Top up your video credits — each personalised video uses one credit.</p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-soft">
          <h3 class="text-lg font-bold text-slate-900">10 credits</h3>
          <p class="text-3xl font-extrabold text-slate-900 mt-2">₹299</p>
          <p class="text-sm text-slate-500 mt-1">~₹30 per video</p>
          <button class="w-full mt-5 px-4 py-2 rounded-lg border border-brand-blue text-brand-blue font-semibold">Buy 10</button>
        </article>
        <article class="rounded-2xl border-2 border-brand-blue bg-white p-6 shadow-soft relative">
          <span class="absolute -top-3 left-1/2 -translate-x-1/2 px-3 py-0.5 rounded-full bg-brand-blue text-white text-[11px] font-bold uppercase tracking-wider">Best value</span>
          <h3 class="text-lg font-bold text-slate-900">50 credits</h3>
          <p class="text-3xl font-extrabold text-slate-900 mt-2">₹999</p>
          <p class="text-sm text-slate-500 mt-1">~₹20 per video</p>
          <button class="w-full mt-5 px-4 py-2 rounded-lg bg-brand-gradient-r text-white font-semibold">Buy 50</button>
        </article>
        <article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-soft">
          <h3 class="text-lg font-bold text-slate-900">200 credits</h3>
          <p class="text-3xl font-extrabold text-slate-900 mt-2">₹2,999</p>
          <p class="text-sm text-slate-500 mt-1">~₹15 per video</p>
          <button class="w-full mt-5 px-4 py-2 rounded-lg border border-slate-300 text-slate-700 font-semibold">Buy 200</button>
        </article>
      </div>
    </main>

    <div data-component="footer"></div>
  </div>

  <div data-component="bottom-nav" data-active="profile"></div>

  <script src="../assets/js/partials.js"></script>
  <script src="../assets/js/ui.js"></script>
</body>
</html>
