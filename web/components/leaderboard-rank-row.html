<div class="flex items-center gap-3 px-4 lg:px-5 py-3 lg:py-4 rounded-2xl text-white shadow-md mb-3 {{gradientClass}}">
  <span class="text-lg lg:text-xl font-extrabold w-10 shrink-0">#{{rank}}</span>
  <div class="w-11 h-11 rounded-full bg-white/30 ring-2 ring-white/50 flex items-center justify-center text-xs font-bold shrink-0">{{initials}}</div>
  <div class="flex-1 min-w-0">
    <p class="text-sm lg:text-base font-bold truncate">{{name}}</p>
    <p class="text-[11px] uppercase opacity-90 tracking-wider">{{role}}</p>
  </div>
  <div class="text-right shrink-0">
    <p class="text-sm lg:text-base font-bold whitespace-nowrap">{{points}} pts</p>
    <p class="text-[11px] inline-flex items-center gap-1 opacity-95 whitespace-nowrap">&#9679; {{location}}</p>
  </div>
</div>
