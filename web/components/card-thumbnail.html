<a href="card-details.html" class="thumb relative block aspect-[3/4] rounded-2xl overflow-hidden bg-slate-200 shadow-soft">
  <img src="{{image}}" alt="{{title}}" class="w-full h-full object-cover" onerror="this.style.display='none'" />
  <div class="absolute inset-0 bg-gradient-to-t from-black/55 via-black/0 to-black/0"></div>
  <span class="absolute top-2 left-2 px-2 py-0.5 rounded-full text-[10px] uppercase tracking-wider {{badgeClass}}">{{badge}}</span>
  <button class="absolute top-2 right-2 w-8 h-8 rounded-full bg-black/40 backdrop-blur flex items-center justify-center text-white" data-heart aria-label="Save to favourites">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  </button>
  <div class="absolute bottom-2 left-2 right-2 text-white text-sm font-semibold drop-shadow">{{title}}</div>
</a>
