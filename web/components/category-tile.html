<a href="{{href}}" class="thumb relative block aspect-[3/4] rounded-2xl overflow-hidden bg-slate-200 shadow-soft">
  <img src="{{image}}" alt="{{title}}" class="w-full h-full object-cover" onerror="this.style.display='none'" />
  <div class="absolute inset-0 bg-gradient-to-t from-black/65 via-black/15 to-transparent"></div>
  <div class="absolute bottom-3 left-3 right-3 text-white font-semibold text-base drop-shadow">{{title}}</div>
</a>
