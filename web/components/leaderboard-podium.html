<div class="flex items-end justify-center gap-6 lg:gap-12 py-4">
  <!-- 2nd place -->
  <div class="text-center">
    <div class="w-16 h-16 rounded-full bg-slate-200 mx-auto ring-4 ring-slate-300 flex items-center justify-center text-slate-500 font-bold">{{secondInitials}}</div>
    <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-white border-2 border-slate-300 text-slate-500 text-xs font-bold -mt-3 relative">2</span>
    <p class="text-sm font-semibold text-slate-900 mt-2">{{secondName}}</p>
    <p class="text-[11px] text-slate-500 uppercase">{{secondRole}}</p>
    <p class="text-sm font-bold text-slate-900 mt-1">{{secondPoints}} pts</p>
    <p class="text-[11px] text-brand-blue mt-0.5">&#9679; {{secondLocation}}</p>
  </div>
  <!-- 1st place with crown -->
  <div class="text-center">
    <div class="text-2xl mb-1">👑</div>
    <div class="w-20 h-20 rounded-full bg-amber-200 mx-auto ring-4 ring-amber-400 flex items-center justify-center text-amber-800 font-bold text-lg">{{firstInitials}}</div>
    <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-amber-400 text-white text-xs font-bold -mt-3 relative">1</span>
    <p class="text-sm font-bold text-slate-900 mt-2">{{firstName}}</p>
    <p class="text-[11px] text-slate-500 uppercase">{{firstRole}}</p>
    <p class="text-base font-extrabold text-slate-900 mt-1">{{firstPoints}} pts</p>
    <p class="text-[11px] text-brand-blue mt-0.5">&#9679; {{firstLocation}}</p>
  </div>
  <!-- 3rd place -->
  <div class="text-center">
    <div class="w-16 h-16 rounded-full bg-orange-100 mx-auto ring-4 ring-orange-300 flex items-center justify-center text-orange-700 font-bold">{{thirdInitials}}</div>
    <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-orange-400 text-white text-xs font-bold -mt-3 relative">3</span>
    <p class="text-sm font-semibold text-slate-900 mt-2">{{thirdName}}</p>
    <p class="text-[11px] text-slate-500 uppercase">{{thirdRole}}</p>
    <p class="text-sm font-bold text-slate-900 mt-1">{{thirdPoints}} pts</p>
    <p class="text-[11px] text-brand-blue mt-0.5">&#9679; {{thirdLocation}}</p>
  </div>
</div>
