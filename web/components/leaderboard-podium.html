<div class="flex items-end justify-center gap-6 lg:gap-12 py-4">
  <div class="text-center">
    <div class="w-16 h-16 rounded-full bg-slate-200 mx-auto ring-2 ring-slate-300 flex items-center justify-center text-slate-500 font-bold">{{secondInitials}}</div>
    <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-white border border-slate-200 text-slate-500 text-xs font-bold mt-1">2</span>
    <p class="text-sm font-semibold text-slate-900 mt-1">{{secondName}}</p>
    <p class="text-[11px] text-slate-500 uppercase">{{secondRole}}</p>
    <p class="text-[11px] text-brand-blue mt-0.5">📍 {{secondLocation}}</p>
  </div>
  <div class="text-center">
    <div class="text-2xl mb-1">👑</div>

    <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-amber-400 text-white text-xs font-bold mt-1">1</span>
    <p class="text-sm font-semibold text-slate-900 mt-1">{{firstName}}</p>
    <p class="text-[11px] text-slate-500 uppercase">{{firstRole}}</p>
    <p class="text-[11px] text-brand-blue mt-0.5">📍 {{firstLocation}}</p>
  </div>
  <div class="text-center">
    <div class="w-16 h-16 rounded-full bg-orange-100 mx-auto ring-2 ring-orange-300 flex items-center justify-center text-orange-700 font-bold">{{thirdInitials}}</div>
    <span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-orange-300 text-white text-xs font-bold mt-1">3</span>
    <p class="text-sm font-semibold text-slate-900 mt-1">{{thirdName}}</p>
    <p class="text-[11px] text-slate-500 uppercase">{{thirdRole}}</p>
    <p class="text-[11px] text-brand-blue mt-0.5">📍 {{thirdLocation}}</p>
  </div>
</div>
