<a href="{{href}}" class="settings-row flex items-center gap-4 px-4 py-4 rounded-2xl border border-slate-200 bg-white hover:border-brand-blue/40 transition mb-3">
  <span class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="{{iconPath}}"/></svg>
  </span>
  <div class="flex-1 min-w-0">
    <p class="text-sm font-semibold text-slate-900">{{title}}</p>
    <p class="row-subtitle text-xs text-slate-500 mt-0.5">{{subtitle}}</p>
  </div>
  <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg>
</a>
