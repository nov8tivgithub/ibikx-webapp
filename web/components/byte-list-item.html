<a href="byte-details.html" class="block bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-soft mb-4">
  <div class="aspect-[16/9] bg-slate-200">
    <img src="{{image}}" alt="{{title}}" class="w-full h-full object-cover" onerror="this.style.display='none'" />
  </div>
  <div class="p-4">
    <div class="flex items-center gap-3 mb-2">
      <span class="w-8 h-8 rounded-full bg-emerald-500 text-white flex items-center justify-center text-sm font-bold">m</span>
      <span class="text-xs text-slate-500">{{time}}</span>
      <span class="ml-auto flex items-center gap-3 text-xs text-slate-500">
        <span class="inline-flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M1.5 12s4-8 10.5-8 10.5 8 10.5 8-4 8-10.5 8S1.5 12 1.5 12z"/><circle cx="12" cy="12" r="3"/></svg>{{views}}</span>
        <span class="inline-flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l18-9-7 18-2-7-9-2z"/></svg>{{shares}}</span>
      </span>
    </div>
    <h3 class="text-base font-semibold text-slate-900 leading-snug">{{title}}</h3>
    <p class="text-sm text-slate-600 mt-1 line-clamp-2">{{excerpt}}</p>
  </div>
</a>
